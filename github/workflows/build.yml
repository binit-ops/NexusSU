name: NexusSU Build Pipeline

on:
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: 'Optional external kernel repo URL (leave empty to use kernel/ in repo)'
        required: false
        default: ''
      kernel_branch:
        description: 'Kernel branch'
        required: false
        default: 'master'

env:
  DEFCONFIG: 'your_defconfig'
  IMAGE_NAME: 'Image.gz-dtb'
  TOOLCHAIN_URL: ${{ secrets.TOOLCHAIN_URL }}

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare kernel source
        run: |
          if [ -n "${{ github.event.inputs.kernel_repo }}" ]; then
            git clone --depth=1 --branch ${{ github.event.inputs.kernel_branch }} ${{ github.event.inputs.kernel_repo }} kernel-src
          else
            if [ -d kernel ]; then
              cp -r kernel kernel-src
            else
              echo "No kernel source provided. Add kernel/ to repo or provide kernel_repo input." && exit 1
            fi
          fi

      - name: Download toolchain
        if: env.TOOLCHAIN_URL != ''
        run: |
          mkdir -p toolchain
          curl -L "${{ env.TOOLCHAIN_URL }}" | tar -xJ -C toolchain

      - name: Apply patches (susfs stub)
        run: |
          chmod +x build-scripts/apply_patches.sh
          ./build-scripts/apply_patches.sh kernel-src patches || true

      - name: Build kernel (safe default)
        run: |
          chmod +x build-scripts/build_kernel.sh
          ./build-scripts/build_kernel.sh kernel-src $DEFCONFIG toolchain || true

      - name: Package AnyKernel (if image exists)
        run: |
          chmod +x build-scripts/package_anykernel.sh
          ./build-scripts/package_anykernel.sh kernel-src/out/${{ env.IMAGE_NAME }} anykernel || true

      - name: Upload AnyKernel artifact (if produced)
        uses: actions/upload-artifact@v4
        with:
          name: anykernel-zip
          path: out/*.zip

  build-manager:
    runs-on: ubuntu-latest
    needs: build-kernel
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Android manager app
        run: |
          cd manager
          chmod +x gradlew || true
          ./gradlew assembleRelease --no-daemon || true

      - name: Sign APK if keystore provided
        if: secrets.APK_SIGN_KEY != ''
        run: |
          mkdir -p /tmp/keystore
          echo "${{ secrets.APK_SIGN_KEY }}" | base64 -d > /tmp/keystore/keystore.jks
          jarsigner -keystore /tmp/keystore/keystore.jks -storepass "${{ secrets.APK_SIGN_KEY_PASS }}" -keypass "${{ secrets.APK_SIGN_KEY_ALIAS_PASS }}" manager/app/build/outputs/apk/release/app-release-unsigned.apk "${{ secrets.APK_SIGN_KEY_ALIAS }}" || true
          zipalign -v -p 4 manager/app/build/outputs/apk/release/app-release-unsigned.apk manager/app/build/outputs/apk/release/app-release.apk || true

      - name: Upload manager APK
        uses: actions/upload-artifact@v4
        with:
          name: manager-apk
          path: manager/app/build/outputs/apk/release/*.apk
          
