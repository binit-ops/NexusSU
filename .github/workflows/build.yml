name: NexusSU Complete Master Builder
on:
  workflow_dispatch: # Allows you to manually click "Run workflow"

permissions:
  contents: write

jobs:
  orchestrate_scaffold:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Branch
        uses: actions/checkout@v4

      - name: Generate Core Directory Architecture
        run: |
          mkdir -p manager/app/src/main/java/com/nexussu/manager/ui/viewmodel
          mkdir -p manager/app/src/main/java/com/nexussu/manager/data
          mkdir -p manager/app/src/main/java/com/nexussu/manager/core
          mkdir -p manager/app/src/main/cpp
          mkdir -p daemon
          mkdir -p kernel/nexussu
          mkdir -p anykernel_template

      - name: Write Kernel Module and Hooks (nexussu.c)
        run: |
          cat << 'EOF' > kernel/nexussu/nexussu.c
          #include <linux/module.h>
          #include <linux/kprobes.h>
          #include <linux/fs.h>
          #include <linux/cred.h>
          #include <linux/miscdevice.h>
          #include <linux/uaccess.h>
          #include <linux/sched.h>
          #include <linux/kthread.h>
          #include <linux/delay.h>
          #include <linux/umh.h>
          #include <linux/namei.h>

          #define VFS_FUNC "vfs_statx"
          #define SELINUX_FUNC "selinux_capable"
          #define MANAGER_UID 10250 

          #define NEXUSSU_IOC_MAGIC 'n'
          #define NEXUSSU_IOCTL_ELEVATE _IO(NEXUSSU_IOC_MAGIC, 1)
          #define NEXUSSU_IOCTL_CHECK   _IO(NEXUSSU_IOC_MAGIC, 2)
          #define NEXUSSU_IOCTL_UPDATE_POLICY _IOW(NEXUSSU_IOC_MAGIC, 3, struct nexussu_policy)

          struct nexussu_policy {
              uid_t uid;
              int allow_root;
              int scope_network;
              int scope_storage;
              long expiry_timestamp;
          };

          #define MAX_POLICIES 256
          static struct nexussu_policy active_policies[MAX_POLICIES];
          static int policy_count = 0;
          static pid_t elevated_pid = 0;
          static struct task_struct *nexussu_daemon_thread;
          static struct kretprobe my_vfs_kretprobe;
          static struct kretprobe my_selinux_kretprobe;

          static int nexussu_vfs_ret(struct kretprobe_instance *ri, struct pt_regs *regs) {
              const struct cred *cred = current_cred();
              if (cred->uid.val != MANAGER_UID) { /* susfs structural simulation */ }
              return 0;
          }

          static int nexussu_selinux_ret(struct kretprobe_instance *ri, struct pt_regs *regs) {
              if (current->pid == elevated_pid && elevated_pid != 0) {
                  regs->regs[0] = 0; 
              }
              return 0;
          }

          static int nexussu_trigger_daemon(void *data) {
              char *argv[] = { "/data/adb/nexussud", NULL };
              char *envp[] = { "HOME=/", "PATH=/sbin:/system/sbin:/system/bin:/system/xbin", NULL };
              struct path path;
              int attempts = 0;
              while (attempts < 60) {
                  if (kern_path(argv[0], LOOKUP_FOLLOW, &path) == 0) {
                      path_put(&path);
                      call_usermodehelper(argv[0], argv, envp, UMH_WAIT_PROC);
                      break;
                  }
                  msleep(1000);
                  attempts++;
              }
              return 0;
          }

          static long nexussu_ioctl(struct file *file, unsigned int cmd, unsigned long arg) {
              struct cred *new_cred;
              switch (cmd) {
                  case NEXUSSU_IOCTL_CHECK:
                      return 0x4E585355;
                  case NEXUSSU_IOCTL_ELEVATE:
                      new_cred = prepare_creds();
                      if (!new_cred) return -ENOMEM;
                      new_cred->uid.val = 0; new_cred->gid.val = 0;
                      new_cred->suid.val = 0; new_cred->sgid.val = 0;
                      new_cred->euid.val = 0; new_cred->egid.val = 0;
                      new_cred->fsuid.val = 0; new_cred->fsgid.val = 0;
                      commit_creds(new_cred);
                      elevated_pid = current->pid;
                      return 0;
                  case NEXUSSU_IOCTL_UPDATE_POLICY:
                      if (copy_from_user(&active_policies[policy_count], (void __user *)arg, sizeof(struct nexussu_policy))) return -EFAULT;
                      policy_count++;
                      return 0;
                  default:
                      return -EINVAL;
              }
          }

          static const struct file_operations nexussu_fops = {
              .owner = THIS_MODULE,
              .unlocked_ioctl = nexussu_ioctl,
              .compat_ioctl = nexussu_ioctl,
          };

          static struct miscdevice nexussu_misc = {
              .minor = MISC_DYNAMIC_MINOR,
              .name = "nexussu",
              .fops = &nexussu_fops,
          };

          static int __init nexussu_init(void) {
              int ret = misc_register(&nexussu_misc);
              if (ret) return ret;
              my_vfs_kretprobe.kp.symbol_name = VFS_FUNC;
              my_vfs_kretprobe.handler = nexussu_vfs_ret;
              if (register_kretprobe(&my_vfs_kretprobe) < 0) return -1;
              my_selinux_kretprobe.kp.symbol_name = SELINUX_FUNC;
              my_selinux_kretprobe.handler = nexussu_selinux_ret;
              if (register_kretprobe(&my_selinux_kretprobe) < 0) return -1;
              nexussu_daemon_thread = kthread_run(nexussu_trigger_daemon, NULL, "nexussu_init");
              return 0;
          }

          static void __exit nexussu_exit(void) {
              unregister_kretprobe(&my_vfs_kretprobe);
              unregister_kretprobe(&my_selinux_kretprobe);
              misc_deregister(&nexussu_misc);
          }

          module_init(nexussu_init);
          module_exit(nexussu_exit);
          MODULE_LICENSE("GPL");
          EOF

      - name: Write Systemless OverlayFS Daemon (nexussud.c)
        run: |
          cat << 'EOF' > daemon/nexussud.c
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>
          #include <unistd.h>
          #include <dirent.h>
          #include <sys/mount.h>
          #include <sys/stat.h>
          #include <android/log.h>

          #define MODULE_DIR "/data/adb/modules"

          void mount_module(const char *mod_name) {
              char mod_sys_path[256];
              char options[1024];
              snprintf(mod_sys_path, sizeof(mod_sys_path), "%s/%s/system", MODULE_DIR, mod_name);
              struct stat st;
              if (stat(mod_sys_path, &st) != 0) return;
              snprintf(options, sizeof(options), "lowerdir=%s:/system", mod_sys_path);
              mount("overlay", "/system", "overlay", MS_RDONLY, options);
          }

          int main(int argc, char *argv[]) {
              if (getuid() != 0) return 1;
              DIR *dir = opendir(MODULE_DIR);
              if (!dir) return 0;
              struct dirent *entry;
              while ((entry = readdir(dir)) != NULL) {
                  if (entry->d_name[0] == '.') continue;
                  char disable_flag[256];
                  snprintf(disable_flag, sizeof(disable_flag), "%s/%s/disable", MODULE_DIR, entry->d_name);
                  if (access(disable_flag, F_OK) == 0) continue;
                  mount_module(entry->d_name);
              }
              closedir(dir);
              return 0;
          }
          EOF

      - name: Write Kconfig and Build Makefiles
        run: |
          echo 'obj-$(CONFIG_NEXUSSU) += nexussu.o' > kernel/nexussu/Makefile
          cat << 'EOF' > kernel/nexussu/Kconfig
          config NEXUSSU
              bool "NexusSU Core"
              default y
              help
                Enable NexusSU kernel hooks for custom root elevation and VFS hiding.
          EOF
          cat << 'EOF' > daemon/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          project("nexussud")
          add_executable(nexussud nexussud.c)
          find_library(log-lib log)
          target_link_libraries(nexussud ${log-lib})
          EOF

      - name: Write App Native JNI layer
        run: |
          cat << 'EOF' > manager/app/src/main/cpp/nexussu_client.cpp
          #include <jni.h>
          #include <fcntl.h>
          #include <unistd.h>
          #include <sys/ioctl.h>

          #define NEXUSSU_IOC_MAGIC 'n'
          #define NEXUSSU_IOCTL_ELEVATE _IO(NEXUSSU_IOC_MAGIC, 1)
          #define NEXUSSU_IOCTL_CHECK   _IO(NEXUSSU_IOC_MAGIC, 2)
          #define NEXUSSU_IOCTL_UPDATE_POLICY _IOW(NEXUSSU_IOC_MAGIC, 3, struct nexussu_policy)

          struct nexussu_policy {
              uid_t uid;
              int allow_root;
              int scope_network;
              int scope_storage;
              long expiry_timestamp;
          };

          extern "C" JNIEXPORT jboolean JNICALL
          Java_com_nexussu_manager_core_NativeRoot_checkKernelDriver(JNIEnv *env, jobject thiz) {
              int fd = open("/dev/nexussu", O_RDWR);
              if (fd < 0) return JNI_FALSE;
              long result = ioctl(fd, NEXUSSU_IOCTL_CHECK, 0);
              close(fd);
              return (result == 0x4E585355) ? JNI_TRUE : JNI_FALSE;
          }

          extern "C" JNIEXPORT jboolean JNICALL
          Java_com_nexussu_manager_core_NativeRoot_requestElevation(JNIEnv *env, jobject thiz) {
              int fd = open("/dev/nexussu", O_RDWR);
              if (fd < 0) return JNI_FALSE;
              int ret = ioctl(fd, NEXUSSU_IOCTL_ELEVATE, 0);
              close(fd);
              return (ret == 0) ? JNI_TRUE : JNI_FALSE;
          }

          extern "C" JNIEXPORT jboolean JNICALL
          Java_com_nexussu_manager_core_NativeRoot_updateAppPolicy(JNIEnv *env, jobject thiz, jint uid, jboolean allowRoot, jboolean scopeNet, jboolean scopeStorage, jlong expiryTime) {
              int fd = open("/dev/nexussu", O_RDWR);
              if (fd < 0) return JNI_FALSE;
              struct nexussu_policy policy;
              policy.uid = (uid_t)uid;
              policy.allow_root = allowRoot ? 1 : 0;
              policy.scope_network = scopeNet ? 1 : 0;
              policy.scope_storage = scopeStorage ? 1 : 0;
              policy.expiry_timestamp = (long)expiryTime;
              int ret = ioctl(fd, NEXUSSU_IOCTL_UPDATE_POLICY, &policy);
              close(fd);
              return (ret == 0) ? JNI_TRUE : JNI_FALSE;
          }
          EOF

          cat << 'EOF' > manager/app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          project("nexussu_client")
          add_library(nexussu_client SHARED nexussu_client.cpp)
          find_library(log-lib log)
          target_link_libraries(nexussu_client ${log-lib})
          EOF

      - name: Write Room Database Logic
        run: |
          cat << 'EOF' > manager/app/src/main/java/com/nexussu/manager/data/AppPolicy.kt
          package com.nexussu.manager.data
          import androidx.room.Entity
          import androidx.room.PrimaryKey

          @Entity(tableName = "app_policies")
          data class AppPolicy(
              @PrimaryKey val uid: Int,
              val packageName: String,
              val appName: String,
              val isGranted: Boolean,
              val scopeNetwork: Boolean,
              val scopeStorage: Boolean,
              val expiryTimestamp: Long
          )
          EOF

          cat << 'EOF' > manager/app/src/main/java/com/nexussu/manager/data/AppPolicyDao.kt
          package com.nexussu.manager.data
          import androidx.room.Dao
          import androidx.room.Insert
          import androidx.room.OnConflictStrategy
          import androidx.room.Query
          import kotlinx.coroutines.flow.Flow

          @Dao
          interface AppPolicyDao {
              @Query("SELECT * FROM app_policies ORDER BY appName ASC")
              fun getAllPolicies(): Flow<List<AppPolicy>>
              @Insert(onConflict = OnConflictStrategy.REPLACE)
              suspend fun insertOrUpdatePolicy(policy: AppPolicy)
          }
          EOF

          cat << 'EOF' > manager/app/src/main/java/com/nexussu/manager/data/NexusDatabase.kt
          package com.nexussu.manager.data
          import android.content.Context
          import androidx.room.Database
          import androidx.room.Room
          import androidx.room.RoomDatabase

          @Database(entities = [AppPolicy::class], version = 1, exportSchema = false)
          abstract class NexusDatabase : RoomDatabase() {
              abstract fun appPolicyDao(): AppPolicyDao
              companion object {
                  @Volatile private var INSTANCE: NexusDatabase? = null
                  fun getDatabase(context: Context): NexusDatabase {
                      return INSTANCE ?: synchronized(this) {
                          val instance = Room.databaseBuilder(context.applicationContext, NexusDatabase::class.java, "nexussu_db").build()
                          INSTANCE = instance
                          instance
                      }
                  }
              }
          }
          EOF

      - name: Write Module Installer Core
        run: |
          cat << 'EOF' > manager/app/src/main/java/com/nexussu/manager/core/ModuleInstaller.kt
          package com.nexussu.manager.core
          import android.content.Context
          import android.net.Uri
          import java.io.File
          import java.io.FileOutputStream
          import java.util.zip.ZipInputStream

          object ModuleInstaller {
              suspend fun installZip(context: Context, zipUri: Uri): Boolean {
                  return try {
                      val inputStream = context.contentResolver.openInputStream(zipUri) ?: return false
                      val zis = ZipInputStream(inputStream)
                      val tempDir = File(context.cacheDir, "mod_extract_${System.currentTimeMillis()}").apply { mkdirs() }
                      var moduleName = "unknown"
                      var entry = zis.nextEntry
                      while (entry != null) {
                          val file = File(tempDir, entry.name)
                          if (entry.isDirectory) { file.mkdirs() } else {
                              file.parentFile?.mkdirs()
                              FileOutputStream(file).use { zis.copyTo(it) }
                              if (entry.name == "module.prop") {
                                  file.forEachLine { if (it.startsWith("id=")) moduleName = it.substringAfter("id=").trim() }
                              }
                          }
                          entry = zis.nextEntry
                      }
                      zis.close()
                      val process = Runtime.getRuntime().exec("su")
                      process.outputStream.use { it.write("mkdir -p /data/adb/modules/$moduleName\ncp -r ${tempDir.absolutePath}/* /data/adb/modules/$moduleName/\nexit\n".toByteArray()) }
                      process.waitFor() == 0
                  } catch (e: Exception) { false }
              }
          }
          EOF

          cat << 'EOF' > manager/app/src/main/java/com/nexussu/manager/core/NativeRoot.kt
          package com.nexussu.manager.core
          object NativeRoot {
              init { System.loadLibrary("nexussu_client") }
              external fun checkKernelDriver(): Boolean
              external fun requestElevation(): Boolean
              external fun updateAppPolicy(uid: Int, allowRoot: Boolean, scopeNet: Boolean, scopeStorage: Boolean, expiryTime: Long): Boolean
          }
          EOF

      - name: Write Jetpack Compose ViewModels and UI Screens
        run: |
          cat << 'EOF' > manager/app/src/main/java/com/nexussu/manager/ui/viewmodel/SuperuserViewModel.kt
          package com.nexussu.manager.ui.viewmodel
          import android.app.Application
          import android.content.pm.ApplicationInfo
          import android.content.pm.PackageManager
          import androidx.lifecycle.AndroidViewModel
          import androidx.lifecycle.viewModelScope
          import com.nexussu.manager.core.NativeRoot
          import com.nexussu.manager.data.AppPolicy
          import com.nexussu.manager.data.NexusDatabase
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.flow.MutableStateFlow
          import kotlinx.coroutines.flow.StateFlow
          import kotlinx.coroutines.launch

          class SuperuserViewModel(application: Application) : AndroidViewModel(application) {
              private val dao = NexusDatabase.getDatabase(application).appPolicyDao()
              private val pm = application.packageManager
              private val _policies = MutableStateFlow<List<AppPolicy>>(emptyList())
              val policies: StateFlow<List<AppPolicy>> = _policies

              init {
                  viewModelScope.launch(Dispatchers.IO) {
                      val installedApps = pm.getInstalledApplications(PackageManager.GET_META_DATA).filter { (it.flags and ApplicationInfo.FLAG_SYSTEM) == 0 }
                      dao.getAllPolicies().collect { dbP ->
                          val dbUids = dbP.map { it.uid }.toSet()
                          installedApps.forEach { app ->
                              if (!dbUids.contains(app.uid)) {
                                  dao.insertOrUpdatePolicy(AppPolicy(app.uid, app.packageName, pm.getApplicationLabel(app).toString(), false, false, false, 0L))
                              }
                          }
                          _policies.value = dbP
                      }
                  }
              }

              fun toggleAppRoot(policy: AppPolicy, isGranted: Boolean) {
                  viewModelScope.launch(Dispatchers.IO) {
                      val updated = policy.copy(isGranted = isGranted)
                      dao.insertOrUpdatePolicy(updated)
                      NativeRoot.updateAppPolicy(updated.uid, updated.isGranted, updated.scopeNetwork, updated.scopeStorage, updated.expiryTimestamp)
                  }
              }
          }
          EOF

          cat << 'EOF' > manager/app/src/main/java/com/nexussu/manager/ui/ModulesSection.kt
